version: '3.8'

services:
  consul:
    image: hashicorp/consul:latest
    container_name: consul_dev
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    command: "agent -dev -client=0.0.0.0"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_dev
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:latest
    container_name: redis_dev
    ports:
      - "6379:6379"
